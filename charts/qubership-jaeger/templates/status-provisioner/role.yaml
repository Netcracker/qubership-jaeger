{{- if .Values.statusProvisioner.install }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: integration-tests-status-provisioner
  labels:
    {{- $name := "integration-tests-status-provisioner" -}}
    {{- include "jaeger.resourceLabels" (dict "ctx" . "name" $name "component" "jaeger-integration-tests") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    "helm.sh/hook-weight": "-3"
rules:
  - apiGroups:
      - apps
    resources:
      - deployments/status
      - daemonsets/status
    verbs:
      - get
      - patch
  - apiGroups:
      - batch
    resources:
      - jobs/status
    verbs:
      - get
      - patch
{{- end }}
