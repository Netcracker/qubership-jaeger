{{- if and .Values.hotrod.install .Values.hotrod.ingress.install }}
{{- $annotations := deepCopy (.Values.hotrod.annotations | default dict) -}}
{{- if .Values.hotrod.ingress.addGatewayApiAnnotation }}
{{- $_ := set $annotations "gateway-api-converter.netcracker.com/ignore" "true" -}}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.jaeger.serviceName }}-hotrod
  labels:
    {{- $name := printf "%s-hotrod" .Values.jaeger.serviceName -}}
    {{- include "jaeger.labels" (dict "ctx" . "name" $name "component" "hotrod") | nindent 4 }}
    {{- if .Values.hotrod.labels }}
      {{- toYaml .Values.hotrod.labels | nindent 4 }}
    {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.hotrod.ingress.className }}
  ingressClassName: {{ .Values.hotrod.ingress.className }}
  {{- end }}
  rules:
    - host: {{ include "hotrod.ingress" . }}
      http:
        paths:
          - path: /
            {{- if semverCompare "<1.21-0" .Capabilities.KubeVersion.GitVersion }}
            backend:
              serviceName: {{ .Values.jaeger.serviceName }}-hotrod
              servicePort: "http"
            {{- else }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.jaeger.serviceName }}-hotrod
                port:
                  name: "http"
            {{- end }}
  {{- if .Values.hotrod.ingress.tls }}
  tls:
    {{- toYaml .Values.hotrod.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
