{{- if .Values.query.install }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- $name := printf "%s-query" .Values.jaeger.serviceName -}}
    {{- include "jaeger.resourceLabels" (dict "ctx" . "name" $name "component" "query") | nindent 4 }}
    {{- if .Values.query.labels }}
      {{- toYaml .Values.query.labels | nindent 4 }}
    {{- end }}
  {{- if .Values.query.annotations }}
  annotations:
    {{- toYaml .Values.query.annotations | nindent 4 }}
  {{- end }}
  name: {{ .Values.jaeger.serviceName }}-query
spec:
  ports:
    - name: metrics
      port: 8888
      protocol: TCP
      targetPort: 8888
    - name: healthcheck
      port: 13133
      targetPort: 13133
      protocol: TCP
    {{- if .Values.proxy.install }}
    - name: http-query
      port: 16686
      protocol: TCP
      targetPort: 16688
    - name: envoy-admin
      port: 9901
      protocol: TCP
      targetPort: 9901
    {{- else }}
    - name: http-query
      port: 16686
      protocol: TCP
      targetPort: 16686
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ .Values.jaeger.serviceName }}-query
    app.kubernetes.io/component: query
  sessionAffinity: None
  type: ClusterIP
{{- end }}
