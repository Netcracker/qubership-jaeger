{{- if eq .Values.proxy.type "oauth2" }}
---
kind: Secret
apiVersion: v1
metadata:
  name: oauth2-token
  labels:
    {{- $name := "oauth2-token" -}}
    {{- include "jaeger.resourceLabels" (dict "ctx" . "name" $name "component" "query") | nindent 4 }}
    {{- if .Values.query.labels }}
      {{- toYaml .Values.query.labels | nindent 4 }}
    {{- end }}
  {{- if .Values.query.annotations }}
  annotations:
    {{- toYaml .Values.query.annotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  token-secret.yaml: >-
    resources:
      - "@type": "type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret"
        name: token
        generic_secret:
          secret:
            inline_string: {{ .Values.proxy.oauth2.clientToken }}
  hmac-secret.yaml: >-
    resources:
      - "@type": "type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret"
        name: hmac
        generic_secret:
          secret:
            inline_bytes: {{ randAlphaNum 32 | b64enc }}
{{- end }}
