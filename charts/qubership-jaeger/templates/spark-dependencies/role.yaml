{{- if .Values.spark.install }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-dependencies-role
  labels:
    {{- $name := "spark-dependencies-role" -}}
    {{- include "jaeger.resourceLabels" (dict "ctx" . "name" $name "component" "jaeger-spark-dependencies") | nindent 4 }}
rules:
  - apiGroups:
      - apps
    resources:
      - deployments/status
      - daemonsets/status
    verbs:
      - get
  - apiGroups:
      - batch
    resources:
      - jobs/status
    verbs:
      - get
      - patch
{{- end }}
