{{- if .Values.spark.install }}
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: spark-dependencies-rolebinding
  labels:
    {{- $name := "spark-dependencies-rolebinding" -}}
    {{- include "jaeger.resourceLabels" (dict "ctx" . "name" $name "component" "jaeger-spark-dependencies") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: spark-dependencies-sa
roleRef:
  kind: Role
  name: spark-dependencies-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
