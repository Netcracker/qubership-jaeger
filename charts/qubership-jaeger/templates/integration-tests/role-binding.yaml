{{- if and .Values.integrationTests.install .Values.integrationTests.serviceAccount.create }}
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.integrationTests.serviceAccount.name }}-service-operator
  labels:
    {{- $name := printf "%s-service-operator" .Values.integrationTests.serviceAccount.name -}}
    {{- include "jaeger.resourceLabels" (dict "ctx" . "name" $name "component" "jaeger-integration-tests") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    "helm.sh/hook-weight": "-5"
subjects:
  - kind: ServiceAccount
    name: {{ .Values.integrationTests.serviceAccount.name }}
roleRef:
  kind: Role
  name: {{ .Values.integrationTests.serviceAccount.name }}-service-operator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
