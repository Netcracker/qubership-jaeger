name: opentelemetry-tracing-java
version: 0.1.0
description: Audits and migrates distributed tracing in Qubership Java services (Spring Boot, Quarkus, pure Java) to OpenTelemetry via Jaeger and OpenTelemetry Collector. Five-layer pipeline (discovery, capability, maturity, transformation, validation). Use for legacy/hybrid/incomplete OTel, TRACING_* and OTLP work, Kafka/async context loss, and tracing tasks without naming the skill package.
author: Qubership

dependencies:
  apm:
    - ../opentelemetry-tracing-common
