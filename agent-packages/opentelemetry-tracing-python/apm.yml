name: opentelemetry-tracing-python
version: 0.1.0
description: Audits and migrates distributed tracing in Qubership Python services (FastAPI/ASGI, Django and Flask/WSGI, pure OTel SDK) to OpenTelemetry via OTLP and Jaeger. Five-layer pipeline (discovery, capability, maturity, transformation, validation). Use for legacy/hybrid/incomplete OTel, TRACING_* and OTLP work, Celery/Kafka/thread-pool async context loss, and tracing tasks without naming the skill package.
author: Qubership

dependencies:
  apm:
    - ../opentelemetry-tracing-common
