---
name: Profanity filter

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.config.outputs.skip }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check if actor is restricted
        id: config
        env:
          ACTOR: ${{ github.actor }}
        run: |
          restricted=$(python3 -c "
          import yaml, os
          with open('.github/config/build-config.yaml') as f:
              config = yaml.safe_load(f)
          actors = config.get('restricted-actors', [])
          print('true' if os.environ['ACTOR'] in actors else 'false')
          ")
          echo "skip=$restricted" >> "$GITHUB_OUTPUT"

  apply-filter:
    needs: [prepare]
    if: ${{ needs.prepare.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
    - name: Scan issue or pull request for profanity
      uses: IEvangelist/profanity-filter@4655e7a15cd4a13a5c9b13affed04a487f556083 # 13.4.0
      id: profanity-filter
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # See https://bit.ly/potty-mouth-replacement-strategies
        replacement-strategy: middle-asterisk # See Replacement strategy
        custom-profane-words-url: https://github.com/Hesham-Elbadawi/list-of-banned-words/raw/refs/heads/master/ru
