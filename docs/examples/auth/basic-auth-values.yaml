# Default values for jaeger.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
jaeger:
  storage:
    type: cassandra

cassandraSchemaJob:
  host: cassandra.cassandra.svc
  keyspace: jaeger
  password: admin
  username: admin
  datacenter: dc1


collector:
  install: true

query:
  install: true

proxy:
  install: true

  # Enable basic auth type
  type: basic
  basic:
    users:
    # Contains string with "<username>:<password>" encoded in base64
    # Some values can be specified during deploy, for example:
    # - YWRtaW46YWRtaW4=    # admin:admin
    # - dGVzdDp0ZXN0        # test:test
    - YWRtaW46YWRtaW4=
  resources:
    limits:
      cpu: 100m
      memory: 200Mi
    requests:
      cpu: 50m
      memory: 100Mi
